// ─── HAVERSINE DISTANCE ──────────────────────────────────────────────────────
function distKm(lat1,lon1,lat2,lon2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getDaysLeft(endDay){
  const today = new Date().getDay(); // 0=Sun…6=Sat
  let diff = endDay - today;
  if(diff <= 0) diff += 7;
  return diff;
}


function getBestStore(p,activeStores){
  const ids=activeStores||STORE_IDS;
  let best=null,bv=Infinity;
  ids.forEach(id=>{if(p.prices[id]!=null&&p.prices[id]<bv){bv=p.prices[id];best=id;}});
  return best;
}
function getBestPrice(p,activeStores){
  const ids=(activeStores||STORE_IDS).filter(id=>p.prices[id]!=null);
  return ids.length?Math.min(...ids.map(id=>p.prices[id])):null;
}
function getWorstPrice(p,activeStores){
  const ids=(activeStores||STORE_IDS).filter(id=>p.prices[id]!=null);
  return ids.length?Math.max(...ids.map(id=>p.prices[id])):null;
}
function fmt(v){return v!=null?`€${v.toFixed(2)}`:"—";}
function perUnit(p,activeStores){
  const bp=getBestPrice(p,activeStores); if(!bp||!p.size) return null;
  if(p.size.includes("kg")&&!p.size.includes("×")){const kg=parseFloat(p.size);return kg&&kg!==1?fmt(bp/kg)+"/kg":null;}
  if(p.size.includes("L")&&!p.size.includes("×")){const l=parseFloat(p.size);return l&&l!==1?fmt(bp/l)+"/L":null;}
  return null;
}

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({data, width=80, height=24}){
  if(!data||data.length<2) return null;
  const mn=Math.min(...data), mx=Math.max(...data);
  const range=mx-mn||0.01;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-((v-mn)/range)*(height-4)-2;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  const trend=data[data.length-1]-data[0];
  const trendColor=trend>0.01?"#E05050":trend<-0.01?"#6DBF6D":"#4A5A75";
  const lastParts=pts.split(" ").pop().split(",");
  return (
    <svg width={width} height={height} style={{display:"block",flexShrink:0}}>
      <polyline points={pts} fill="none" stroke={trendColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={parseFloat(lastParts[0])} cy={parseFloat(lastParts[1])} r="2.5" fill={trendColor}/>
    </svg>
  );
}

function spestiScore(savings, worstTotal, listCount){
  if(!worstTotal||!listCount) return null;
  const pctSaved=(savings/worstTotal)*100;
  const efficiency=Math.min(pctSaved/12,1)*70;
  const coverage=Math.min(listCount/10,1)*30;
  return Math.round(efficiency+coverage);
}

// ─── SHARE LIST PANEL ────────────────────────────────────────────────────────
function SharePanel({listItems, storeBreakdown, activeArr, getQty, lang, onClose}){
  const [copied, setCopied] = React.useState(false);

  function buildShareText(){
    const lines = [];
    const date = new Date().toLocaleDateString(lang==="BG"?"bg-BG":"en-GB",{day:"numeric",month:"long"});
    lines.push(lang==="BG"?`🛒 Моят Списък — Spesti (${date})`:`🛒 My Shopping List — Spesti (${date})`);
    lines.push("");
    storeBreakdown.forEach(store=>{
      if(!store.items.length) return;
      const total = store.items.reduce((s,p)=>s+(p.prices[store.id]||0)*getQty(p.id),0);
      lines.push(`📍 ${store.name} — ${fmt(total)}`);
      store.items.forEach(p=>{
        const qty = getQty(p.id);
        const name = lang==="BG"?p.nameBG:p.nameEN;
        const price = fmt((p.prices[store.id]||0)*qty);
        lines.push(`  ${qty>1?qty+"× ":""}${name} → ${price}`);
      });
      lines.push("");
    });
    // items not assigned to any store
    const assignedIds = new Set(storeBreakdown.flatMap(s=>s.items.map(p=>p.id)));
    const unassigned = listItems.filter(p=>!assignedIds.has(p.id));
    if(unassigned.length){
      lines.push(lang==="BG"?"📦 Останали:":"📦 Other items:");
      unassigned.forEach(p=>{
        const qty = getQty(p.id);
        lines.push(`  ${qty>1?qty+"× ":""}${lang==="BG"?p.nameBG:p.nameEN}`);
      });
      lines.push("");
    }
    const total = listItems.reduce((s,p)=>s+(getBestPrice(p,activeArr)||0)*getQty(p.id),0);
    lines.push(lang==="BG"?`💰 Общо оптимално: ${fmt(total)}`:`💰 Optimised total: ${fmt(total)}`);
    lines.push(lang==="BG"?"Генерирано от spesti.bg":"via spesti.bg");
    return lines.join("\n");
  }

  const text = buildShareText();

  function copyToClipboard(){
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200);});
    } else {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>setCopied(false),2200);
    }
  }

  const waText = encodeURIComponent(text);
  const waUrl = `https://wa.me/?text=${waText}`;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div style={{width:"100%",background:"#0A0F1A",borderRadius:"18px 18px 0 0",padding:"22px 20px 36px",maxWidth:600,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:17,color:"#EDE5D0"}}>
            {lang==="BG"?"📤 Сподели Списъка":"📤 Share Your List"}
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#3A4A65",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        <div style={{background:"#060C18",border:"1px solid #131E30",borderRadius:10,padding:"11px 13px",marginBottom:14,maxHeight:180,overflowY:"auto"}}>
          <pre style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#4A5A75",lineHeight:1.6,whiteSpace:"pre-wrap",margin:0}}>{text}</pre>
        </div>

        <div style={{display:"flex",gap:10}}>
          <a href={waUrl} target="_blank" rel="noopener" style={{flex:1,textDecoration:"none"}}>
            <button className="share-btn" style={{width:"100%",justifyContent:"center"}}>
              <span style={{fontSize:16}}>📱</span>
              {lang==="BG"?"Изпрати в WhatsApp":"Send via WhatsApp"}
            </button>
          </a>
          <button className="share-btn copy" onClick={copyToClipboard} style={{flex:1,justifyContent:"center"}}>
            <span style={{fontSize:14}}>{copied?"✓":"📋"}</span>
            {copied?(lang==="BG"?"Копирано!":"Copied!"):(lang==="BG"?"Копирай текст":"Copy text")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── TREND PANEL ─────────────────────────────────────────────────────────────
function TrendPanel({hist, lang}){
  const chg = hist[hist.length-1] - hist[0];
  const color = chg>0.005 ? "#E05050" : chg<-0.005 ? "#6DBF6D" : "#4A5A75";
  const trendTxt = lang==="BG"
    ? (chg>0.005 ? "↑ нагоре" : chg<-0.005 ? "↓ надолу" : "стабилно") + " пр. 8 седм."
    : (chg>0.005 ? "↑ up" : chg<-0.005 ? "↓ down" : "stable") + " vs 8w ago";
  const lowPrice = Math.min(...hist);
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 10px",background:"#0A1020",borderRadius:8}}>
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:4}}>{lang==="BG"?"8-СЕДМИЧНА ТЕНДЕНЦИЯ":"8-WEEK TREND"}</div>

        <div style={{fontSize:9,color:"#1A2A40",fontFamily:"'Source Sans 3',sans-serif",marginTop:2}}>{lang==="BG"?"мин:":"low:"} {fmt(lowPrice)}</div>
      </div>
    </div>
  );
}

        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#EDE5D0",fontWeight:700,marginBottom:5}}>{label}</div>
        <div style={{background:"#131E30",borderRadius:4,height:5,marginBottom:4,overflow:"hidden"}}>
          <div style={{width:sc+"%",height:"100%",background:color,borderRadius:4}}/>
        </div>
        <div style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>{hint}</div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function Spesti(){
  const [phase,setPhase]         = useState("welcome");
  // onboarding: "location" step + pref steps
  const [onboardStage,setOStage] = useState("location"); // "location" | "prefs"
  const [step,setStep]           = useState(0);
  const [prefs,setPrefs]         = useState({});
  const [activeStores,setActive] = useState(new Set(STORE_IDS)); // which chains user shops at
  const [userLoc,setUserLoc]     = useState(null);
  const [lang,setLang]           = useState("BG");
  const [view,setView]           = useState("list");
  const [weeklyList,setList]     = useState(new Set(DEFAULT_LIST));
  const [quantities,setQtys]     = useState({});
  const [search,setSearch]       = useState("");
  const [selCat,setSelCat]       = useState("All");
  const [expandedId,setExpId]    = useState(null);
  const [selStore,setSelStore]   = useState(null);
  const [animIn,setAnimIn]       = useState(false);
  const [watchlist,setWatch]     = useState(new Set());
  const [sortMode,setSortMode]   = useState("savings");
  const [showStoreMgr,setStoreMgr] = useState(false);
  const [showShare,setShowShare]   = useState(false);
  const [toast,setToast]           = useState(null);
  const [appLoading,setAppLoading] = useState(true);

  if (appLoading) {
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#E8C547",fontFamily:"'Playfair Display',serif"}}>
        <div style={{fontSize:48,marginBottom:16,animation:"pulse 1.5s infinite"}}>🛒</div>
        <div style={{fontSize:24,fontWeight:800}}>{lang==="BG"?"Зареждане на Spesti…":"Loading Spesti…"}</div>
        <div style={{fontSize:14,color:"#4A5A75",fontFamily:"'Source Sans 3',sans-serif",marginTop:8}}>{lang==="BG"?"Синхронизиране на цени от супермаркетите":"Fetching latest supermarket prices"}</div>
      </div>
    );
  }

  useEffect(()=>{ setTimeout(()=>setAnimIn(true),80); },[]);

  const activeArr = [...activeStores];
  const activeChains = ALL_CHAINS.filter(c=>activeStores.has(c.id));

  const pname = prod => lang==="BG"?prod.nameBG:prod.nameEN;
  const getQty = id => quantities[id]||1;
  const toggleItem = id => setList(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });
  const toggleWatch = id => setWatch(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });

  const applyPrefs = prod=>{
    const cp=prefs[prod.category]; if(!cp) return true;
    if(!cp.anyBrand&&cp.brands.length>0&&!cp.brands.includes(prod.brand)) return false;
    if(cp.excludedBrands?.includes(prod.brand)) return false;
    if(!cp.anyFat&&cp.fats?.length>0&&prod.fatPct&&!cp.fats.includes(prod.fatPct)) return false;
    if(cp.sizes?.length>0&&prod.size&&!cp.sizes.includes(prod.size)) return false;
    return true;
  };

  // Only include products that have at least one price in user's active stores
  const visibleProds = useMemo(()=>PRODUCTS.filter(p=>applyPrefs(p)&&activeArr.some(id=>p.prices[id]!=null)),[prefs,activeStores]);
  const searchProds  = useMemo(()=>visibleProds.filter(p=>
    (p.nameEN.toLowerCase().includes(search.toLowerCase())||p.nameBG.toLowerCase().includes(search.toLowerCase()))&&(selCat==="All"||p.category===selCat)
  ),[visibleProds,search,selCat,lang]);

  const listItems      = PRODUCTS.filter(p=>weeklyList.has(p.id));
  const optimizedTotal = listItems.reduce((s,p)=>s+(getBestPrice(p,activeArr)||0)*getQty(p.id),0);
  const worstTotal     = listItems.reduce((s,p)=>s+(getWorstPrice(p,activeArr)||0)*getQty(p.id),0);
  const savings        = worstTotal-optimizedTotal;
  const savingsPct     = worstTotal>0?((savings/worstTotal)*100).toFixed(0):0;

  const storeBreakdown = activeChains.map(store=>{
    const items=listItems.filter(p=>getBestStore(p,activeArr)===store.id&&p.prices[store.id]!=null);
    const total=items.reduce((s,p)=>s+(p.prices[store.id]||0)*getQty(p.id),0);
    const altTotal=items.reduce((s,p)=>s+(getWorstPrice(p,activeArr)||0)*getQty(p.id),0);
    return {...store,items,total,storeSavings:altTotal-total};
  }).filter(s=>s.items.length>0);

  const sortedListProdsFor = cat => {
    const items=visibleProds.filter(p=>p.category===cat&&(search===""||(p.nameEN.toLowerCase().includes(search.toLowerCase())||p.nameBG.toLowerCase().includes(search.toLowerCase()))));
    if(sortMode==="savings") return [...items].sort((a,b)=>((getWorstPrice(b,activeArr)||0)-(getBestPrice(b,activeArr)||0))-((getWorstPrice(a,activeArr)||0)-(getBestPrice(a,activeArr)||0)));
    if(sortMode==="price")   return [...items].sort((a,b)=>(getBestPrice(a,activeArr)||0)-(getBestPrice(b,activeArr)||0));
    return [...items].sort((a,b)=>pname(a).localeCompare(pname(b)));
  };

  const cats=["All",...Object.keys(CAT_ICONS)];

  // ── WELCOME ────────────────────────────────────────────────────────────────
  if(phase==="welcome") return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 18% 50%,#0B1E3A 0%,#05090F 65%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>

      <div style={{maxWidth:460,textAlign:"center",width:"100%"}}>

            <button className={"lang-btn"+(lang==="EN"?" active":"")} onClick={()=>setLang("EN")}>EN</button>

        <div style={{fontSize:46,marginBottom:10}}>🛒</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:46,fontWeight:900,color:"#E8C547",lineHeight:1}}>Spesti</div>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#2A3A55",letterSpacing:"3px",textTransform:"uppercase",marginTop:7,marginBottom:10}}>
          {lang==="BG"?"Смарт Пазаруване · България":"Smart Grocery Comparison · Bulgaria"}
        </div>

        <div style={{display:"flex",justifyContent:"center",gap:7,marginBottom:28,flexWrap:"wrap"}}>

              <div key={tx} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10,fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#6A7A90",lineHeight:1.4}}>
                <span style={{fontSize:17,flexShrink:0}}>{ic}</span>{tx}
              </div>
            ))
            : [["📍","Finds stores near you & shows only available prices"],["💰","Shows exactly how much you save every week"],["🎯","Personalised to your brands, fat % and sizes"],["📋","Builds your weekly list → store-by-store shopping plan"],["🔜","4 more chains coming · 15+ by end of year"]].map(([ic,tx])=>(
              <div key={tx} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10,fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#6A7A90",lineHeight:1.4}}>

              </div>

        </div>

        <button onClick={()=>setPhase("onboarding")} style={{width:"100%",background:"#E8C547",border:"none",borderRadius:10,padding:"16px 28px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:900,fontSize:15,color:"#09111F",cursor:"pointer",marginBottom:10}}>
          {lang==="BG"?"🛒 Настрой Профила Си →":"🛒 Set Up My Profile →"}
        </button>
        <button onClick={()=>setPhase("app")} style={{width:"100%",background:"none",border:"1px solid #172030",borderRadius:10,padding:"12px 28px",fontFamily:"'Source Sans 3',sans-serif",fontWeight:600,fontSize:13,color:"#3A4A65",cursor:"pointer"}}>
          {lang==="BG"?"Пропусни — разгледай всичко":"Skip — browse everything"}
        </button>
      </div>
    </div>
  );

  // ── ONBOARDING ─────────────────────────────────────────────────────────────
  if(phase==="onboarding"){
    const totalSteps = ONBOARD_CATS.length + 1; // +1 for location step
    const curStepNum = onboardStage==="location" ? 0 : step+1;
    return (
      <div style={{minHeight:"100vh",background:"#05090F",color:"#EDE5D0"}}>
        <style>{CSS}</style>
        <div style={{background:"#090F1D",borderBottom:"1px solid #131E30",padding:"12px 20px",display:"flex",alignItems:"center",gap:16}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,color:"#E8C547",fontSize:19}}>🛒 Spesti</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:10,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>
                {onboardStage==="location"?(lang==="BG"?"Стъпка 1 — Твоите Магазини":"Step 1 — Your Stores"):(lang==="BG"?`Стъпка ${curStepNum+1} — ${ONBOARD_CATS[step]}`:`Step ${curStepNum+1} — ${ONBOARD_CATS[step]}`)}
              </span>
              <span style={{fontSize:10,color:"#E8C547",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700}}>{curStepNum+1} / {totalSteps}</span>

              />

        </div>
      </div>
    );
  }

  // ── STORE MANAGER MODAL ────────────────────────────────────────────────────
  if(showStoreMgr) return (

      <div style={{background:"#090F1D",borderBottom:"1px solid #131E30",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,color:"#E8C547",fontSize:19}}>{lang==="BG"?"🏪 Моите Магазини":"🏪 My Stores"}</div>
        <button onClick={()=>setStoreMgr(false)} className="ctrl-btn">{lang==="BG"?"← Назад":"← Back"}</button>
      </div>
      <div style={{maxWidth:540,margin:"0 auto",padding:"24px 20px 60px"}}>
        <NearbyStores userLoc={userLoc} activeStores={activeStores} setActiveStores={setActive} lang={lang} onDone={()=>setStoreMgr(false)}/>
      </div>
    </div>

  // ── APP ────────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#05090F",color:"#EDE5D0"}}>
      <style>{CSS}</style>
      {showShare&&<SharePanel listItems={listItems} storeBreakdown={storeBreakdown} activeArr={activeArr} getQty={getQty} lang={lang} onClose={()=>setShowShare(false)}/>}
      {toast&&<div className="toast">{toast}</div>}

      {/* HEADER */}
      <div style={{background:"#080E1C",borderBottom:"1px solid #131E30",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:920,margin:"0 auto",padding:"0 14px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:11,paddingBottom:3}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:900,color:"#E8C547",lineHeight:1}}>🛒 Spesti</div>
                <div style={{fontSize:8,color:"#1F2D45",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginTop:1}}>Smart Grocery · Bulgaria</div>
              </div>
              {/* Active store logos */}
              <div style={{display:"flex",gap:3,marginLeft:6}}>
                {activeChains.slice(0,5).map(c=><ChainLogo key={c.id} chainId={c.id} size={20}/>)}{activeChains.length>5&&<span style={{fontSize:9,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif",marginLeft:2}}>+{activeChains.length-5}</span>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              {weeklyList.size>0&&<div style={{background:"#E8C547",color:"#09111F",borderRadius:"50%",width:20,height:20,fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Source Sans 3',sans-serif"}}>{weeklyList.size}</div>}
              {watchlist.size>0&&<div style={{background:"#0D2A3A",border:"1px solid #1A5060",borderRadius:6,padding:"3px 7px",fontSize:9,color:"#4ABFD0",fontFamily:"'Source Sans 3',sans-serif",fontWeight:700}}>🔔 {watchlist.size}</div>}
              {listItems.length>0&&<button onClick={()=>setShowShare(true)} className="ctrl-btn" style={{display:"flex",alignItems:"center",gap:4}}>📤</button>}
              <button onClick={()=>setStoreMgr(true)} className="ctrl-btn" style={{display:"flex",alignItems:"center",gap:4}}>
                🏪 <span style={{fontSize:10,fontWeight:800,color:"#E8C547"}}>{activeStores.size}</span>
              </button>
              <button onClick={()=>{setPhase("onboarding");setOStage("prefs");setStep(0);}} className="ctrl-btn">⚙</button>
              <div className="lang-toggle">
                <button className={"lang-btn"+(lang==="BG"?" active":"")} onClick={()=>setLang("BG")}>БГ</button>
                <button className={"lang-btn"+(lang==="EN"?" active":"")} onClick={()=>setLang("EN")}>EN</button>
              </div>
            </div>
          </div>
          <div style={{display:"flex",overflowX:"auto",marginTop:4}}>
            {(lang==="BG"?[["list","📋 Списък"],["search","🔍 Намери"],["storeview","🏪 Магазини"],["summary","💰 Спестявания"]]:[["list","📋 My List"],["search","🔍 Find Item"],["storeview","🏪 By Store"],["summary","💰 Savings"]]).map(([id,label])=>(

            <div style={{fontSize:12,color:"#2A3A55",fontFamily:"'Source Sans 3',sans-serif"}}>
              {lang==="BG"?`Сравняваме ${activeStores.size} магазина: ${activeChains.slice(0,4).map(c=>c.name).join(" · ")}${activeChains.length>4?" + "+(activeChains.length-4)+" още":""}`:(`Comparing ${activeStores.size} store${activeStores.size!==1?"s":""}: ${activeChains.slice(0,4).map(c=>c.name).join(" · ")}${activeChains.length>4?" + "+(activeChains.length-4)+" more":""}`)}
            </div>
          </div>

            <div>
              <div style={{fontSize:9,color:"#1A4010",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginBottom:2}}>{lang==="BG"?"ТАЗИ СЕДМИЦА":"THIS WEEK"}</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,color:"#6DBF6D"}}>{lang==="BG"?`✓ ${listItems.length} продукта избрани`:`✓ ${listItems.length} items selected`}</span>
            </div>
            <div style={{display:"flex",gap:18,alignItems:"center"}}>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#1A4010",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>{lang==="BG"?"Най-добра Сума":"Best Total"}</div>

              <div style={{width:1,height:30,background:"#1A3A1A"}}/>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#1A4010",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>{lang==="BG"?"Спестяваш":"You Save"}</div>

            </div>

          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>

          {Object.keys(CAT_ICONS).map(cat=>{
            const catProds=sortedListProdsFor(cat);

            const selCount=catProds.filter(p=>weeklyList.has(p.id)).length;

              <div key={cat} style={{marginBottom:20}}>

                    <div>
                      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"#EDE5D0"}}>{pname(prod)}</div>
                      <div style={{fontSize:10,color:"#2A5060",fontFamily:"'Source Sans 3',sans-serif",marginTop:1}}>{lang==="BG"?"Най-добро":"Best"}: {fmt(getBestPrice(prod,activeArr))} {lang==="BG"?"в":"at"} {ALL_CHAINS.find(c=>c.id===getBestStore(prod,activeArr))?.name||"?"}</div>
                    </div>
                  </div>
                  <button onClick={()=>toggleWatch(prod.id)} style={{background:"none",border:"none",color:"#1A5060",cursor:"pointer",fontSize:14}}>✕</button>
                </div>
              ))}
            </div>}
          </>}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Spesti/>);
  </script>
</body>
</html>
