// ─── HAVERSINE DISTANCE ──────────────────────────────────────────────────────
function distKm(lat1,lon1,lat2,lon2){
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function _remapProduct(raw) {
  const prices = {};
  const sale = {};
  if (raw.prices) {
    for (const [key, val] of Object.entries(raw.prices)) {
      const mapped = _STORE_KEY_MAP[key];
      if (mapped === null) continue;      // explicitly excluded
      // v2 pipeline uses clean ASCII slugs, so pass through unknown keys
      const storeId = mapped !== undefined ? mapped : key;
      if (prices[storeId] == null || val < prices[storeId]) {
        prices[storeId] = val; // keep cheapest if multiple entries map to same chain
      }
    }
  }
  if (raw.sale) {
    for (const [key, val] of Object.entries(raw.sale)) {
      const m = _STORE_KEY_MAP[key];
      if (m === null) continue;
      const sid = m !== undefined ? m : key;
      if (val && typeof val === 'number') { if (sale[sid] == null || val < sale[sid]) sale[sid] = val; }
      else if (val) sale[sid] = true;
    }
  }
  // Category and nameEN now come from the v2.1 pipeline
  let category = raw.category || "Pantry";
  let nameEN = raw.nameEN || raw.name || "";
  // Clean up double spaces in all names
  nameEN = nameEN.replace(/\s{2,}/g, ' ').trim();

  // v2.20: Remap unit prices (same store key mapping as prices)
  const up = {};
  if (raw.up) {
    for (const [key, val] of Object.entries(raw.up)) {
      const mapped = _STORE_KEY_MAP[key];
      if (mapped === null) continue;
      const storeId = mapped !== undefined ? mapped : key;
      if (up[storeId] == null || val < up[storeId]) {
        up[storeId] = val;
      }
    }
  }

  return {
    id: raw.id || raw.name,
    category,
    nameEN,
    nameBG: (raw.nameBG || raw.name || "").replace(/\s{2,}/g, ' ').trim(),
    name: (raw.name || raw.nameEN || "").replace(/\s{2,}/g, ' ').trim(),

    size: raw.size || null,
    fatPct: raw.fatPct || null,
    img: null,
    prices,
    sale,
    up: Object.keys(up).length > 0 ? up : null,
    ut: raw.ut || null,
    sc: raw.sc || null,
    sc2: raw.sc2 || null,
  };
}

// ─── SMART CASCADING FILTER: computes available options from actual data ──────
function getFilteredOptions(cat, currentPrefs, allProducts) {
  const meta = CAT_META[cat] || {hasFat:false, hasBrand:false, sizes:[]};
  const catProds = allProducts.filter(p => p.category === cat);
  const cp = currentPrefs || {anyBrand:true, brands:[], excludedBrands:[], anyFat:true, fats:[], sizes:[]};

  // Step 1: All brands in category with counts
  const brandMap = {};
  catProds.forEach(p => {
    const b = p.brand || "Unknown";
    if (!brandMap[b]) brandMap[b] = {name: b, count: 0, products: []};
    brandMap[b].count++;
    brandMap[b].products.push(p);
  });
  const allBrands = Object.values(brandMap).sort((a,b) => b.count - a.count);

  // Step 2: Filter products by selected brands (if specific)
  let afterBrand = catProds;
  if (!cp.anyBrand && cp.brands.length > 0) {
    afterBrand = catProds.filter(p => cp.brands.includes(p.brand));
  }
  // Remove excluded brands
  if (cp.excludedBrands?.length > 0) {
    afterBrand = afterBrand.filter(p => !cp.excludedBrands.includes(p.brand));
  }

  // Step 3: Available fats from brand-filtered products
  const fatMap = {};
  if (meta.hasFat) {
    afterBrand.forEach(p => {
      if (p.fatPct != null) {
        if (!fatMap[p.fatPct]) fatMap[p.fatPct] = {value: p.fatPct, count: 0};
        fatMap[p.fatPct].count++;
      }
    });
  }
  const availableFats = Object.values(fatMap).sort((a,b) => b.value - a.value);

  // Step 4: Filter by selected fats
  let afterFat = afterBrand;
  if (meta.hasFat && !cp.anyFat && cp.fats?.length > 0) {
    afterFat = afterBrand.filter(p => p.fatPct == null || cp.fats.includes(p.fatPct));
  }

  // Step 5: Available sizes from brand+fat filtered products
  const sizeMap = {};
  afterFat.forEach(p => {
    if (p.size) {
      if (!sizeMap[p.size]) sizeMap[p.size] = {value: p.size, count: 0};
      sizeMap[p.size].count++;
    }
  });
  const availableSizes = Object.values(sizeMap).sort((a,b) => {
    const na = parseFloat(a.value) || 0, nb = parseFloat(b.value) || 0;
    return na - nb;
  });

  // Step 6: Final filtered products (after all prefs)
  let finalProds = afterFat;
  if (cp.sizes?.length > 0) {
    finalProds = afterFat.filter(p => !p.size || cp.sizes.includes(p.size));
  }

  return {
    brands: allBrands,
    fats: availableFats,
    sizes: availableSizes,
    matchCount: finalProds.length,
    matchedProducts: finalProds,
    totalInCategory: catProds.length,
  };
}

        oldPrice: regPrice, newPrice: salePrice, pct, endDay: 7,

function getBestStore(p,activeStores){

// ─── COMPARABLE PRODUCT FINDER ─────────────────────
// When a product isn't available at a store, find the cheapest comparable
// product (same category + same size) that IS available there.
const _compCache = {};
function findComparable(prod, storeId) {
  const key = prod.id + '|' + storeId;
  if (_compCache[key] !== undefined) return _compCache[key];
  const cat = prod.category;
  if (!cat) { _compCache[key] = null; return null; }
  const sz = prod.size;
  const pWords = (prod.name||'').toLowerCase().split(/\s+/).filter(w=>w.length>2);
  const subcat = prod.subcategory || '';
  let best = null, bestPrice = Infinity, bestScore = -1;
  for (let i = 0; i < PRODUCTS.length; i++) {
    const p = PRODUCTS[i];
    if (p.id === prod.id || p.category !== cat) continue;
    const price = getEffPrice(p, storeId);
    if (price == null) continue;
    const cWords = (p.name||'').toLowerCase().split(/\s+/);
    const overlap = pWords.filter(w => cWords.includes(w)).length;
    const sameSubcat = subcat && (p.subcategory||'') === subcat;
    // Exact size match + same subcategory = strong match
    if (sz && p.size === sz && sameSubcat) {
      const score = 10 + overlap;
      if (score > bestScore || (score === bestScore && price < bestPrice)) { bestPrice = price; best = p; bestScore = score; }
    }
    // Same size, different subcategory but name overlap
    else if (sz && p.size === sz && overlap > 0) {
      const score = 5 + overlap;
      if (score > bestScore || (score === bestScore && price < bestPrice)) { bestPrice = price; best = p; bestScore = score; }
    }
    // No size match but good name overlap (at least 1 meaningful word)
    else if (overlap > 0) {
      const score = overlap;
      if (score > bestScore || (score === bestScore && price < bestPrice)) { bestPrice = price; best = p; bestScore = score; }
    }
  }
  // No fallback — only return genuinely similar products
  _compCache[key] = best;
  return best;
}

// ─── SMART TRIP PLANNER: combinatorial store optimizer ─────────────────────
function _combinations(arr, k) {
  if (k === 0) return [[]];
  if (k >= arr.length) return [arr.slice()];
  const result = [];
  function pick(start, chosen) {
    if (chosen.length === k) { result.push(chosen.slice()); return; }
    for (let i = start; i <= arr.length - (k - chosen.length); i++) {
      chosen.push(arr[i]);
      pick(i + 1, chosen);
      chosen.pop();
    }
  }
  pick(0, []);
  return result;
}

function optimizeStoreLimit(listItems, activeArr, maxStores, getQty) {
  // Find the best combination of maxStores stores that minimizes total cost
  // Uses getEffPrice to account for sale prices
  const storesWithItems = activeArr.filter(sid => listItems.some(p => p.prices[sid] != null));
  if (maxStores >= storesWithItems.length) {
    const total = listItems.reduce((s, p) => s + (getBestPrice(p, storesWithItems) || 0) * getQty(p.id), 0);
    return { stores: storesWithItems, total, limited: false };
  }
  const combos = _combinations(storesWithItems, maxStores);
  let bestCombo = null, bestTotal = Infinity;
  for (const combo of combos) {
    let total = 0;
    for (const p of listItems) {
      let cheapest = Infinity;
      for (const sid of combo) {
        if (p.prices[sid] != null) {
          const eff = getEffPrice(p, sid);
          if (eff < cheapest) cheapest = eff;
        }
      }
      if (cheapest < Infinity) total += cheapest * getQty(p.id);
      else {
        // Item not available in this combo — use worst price as penalty
        const wp = getWorstPrice(p, storesWithItems);
        if (wp) total += wp * getQty(p.id);
      }
    }
    if (total < bestTotal) { bestTotal = total; bestCombo = combo; }
  }
  return { stores: bestCombo || storesWithItems.slice(0, maxStores), total: bestTotal, limited: true };
}

function isRetailProduct(p){

  const val=parseFloat(m[1].replace(',','.'));

// ─── CHIPS ────────────────────────────────────────────────────────────────────
function Chip({label,selected,onToggle,color="var(--accent)",count=null,disabled=false,excluded=false}){
  const bg = excluded ? "#E0505030" : disabled ? "var(--bg-deep)" : selected ? color : "var(--bg-card)";
  const border = excluded ? "#E05050" : disabled ? "var(--border)" : selected ? color : "var(--border)";
  const fg = excluded ? "#E05050" : disabled ? "var(--text-3)" : selected ? "var(--accent-text)" : "var(--text-2)";
  return <button className="chip-btn" onClick={disabled?undefined:onToggle} style={{background:bg,borderColor:border,color:fg,opacity:disabled?0.4:1,cursor:disabled?"not-allowed":"pointer",textDecoration:excluded?"line-through":"none"}}>
    {label}{count!=null&&<span style={{marginLeft:4,fontSize:9,opacity:0.7}}>({count})</span>}
  </button>;
}

function NearbyStores({userLoc,activeStores,setActiveStores,onDone,lang="BG"}){
  const [locState,setLocState]   = useState(userLoc?"found":"idle"); // idle|loading|found|denied
  const [coords,setCoords]       = useState(userLoc);
  const [nearbyChains,setNearby] = useState([]);
  const [cityName,setCityName]   = useState(userLoc?.city||"");
  const RADIUS_KM = 15;

  const findNearby = (lat,lon) => {
    const seen = new Set();
    const results = [];
    STORE_LOCATIONS.forEach(loc=>{
      const d = distKm(lat,lon,loc.lat,loc.lon);
      if(d<=RADIUS_KM && !seen.has(loc.chain)){
        seen.add(loc.chain);
        results.push({chainId:loc.chain, dist:d, city:loc.city, address:loc.address});
      }
    });
    results.sort((a,b)=>a.dist-b.dist);
    setNearby(results);
    if(results.length>0) setCityName(results[0].city);
    // Auto-select all found live chains
    const liveFound=results.filter(r=>ALL_CHAINS.find(c=>c.id===r.chainId)?.status==="live").map(r=>r.chainId);
    if(liveFound.length>0) setActiveStores(new Set(liveFound));
  };

    navigator.geolocation.getCurrentPosition(
      pos=>{ const {latitude:lat,longitude:lon}=pos.coords; setCoords({lat,lon}); setLocState("found"); findNearby(lat,lon); },

// ─── SPARKLINE ────────────────────────────────────────────────────────────────
function Sparkline({data, width=80, height=24}){
  if(!data||data.length<2) return null;
  const mn=Math.min(...data), mx=Math.max(...data);
  const range=mx-mn||0.01;
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*width;
    const y=height-((v-mn)/range)*(height-4)-2;
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  const trend=data[data.length-1]-data[0];
  const trendColor=trend>0.01?"#E05050":trend<-0.01?"var(--green)":"var(--text-muted)";
  const lastParts=pts.split(" ").pop().split(",");
  return (
    <svg width={width} height={height} style={{display:"block",flexShrink:0}}>
      <polyline points={pts} fill="none" stroke={trendColor} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={parseFloat(lastParts[0])} cy={parseFloat(lastParts[1])} r="2.5" fill={trendColor}/>
    </svg>
  );
}

function spestiScore(savings, worstTotal, listCount){
  if(!worstTotal||!listCount) return null;
  const pctSaved=(savings/worstTotal)*100;
  const efficiency=Math.min(pctSaved/12,1)*70;
  const coverage=Math.min(listCount/10,1)*30;
  return Math.round(efficiency+coverage);
}

function PriceBar({prod,activeStores,lang}){
  const storeArr=ALL_CHAINS.filter(c=>activeStores.has(c.id)&&prod.prices[c.id]!=null);
  if(!storeArr.length) return null;
  const bestId=getBestStore(prod,[...activeStores]);
  const bestP=getBestPrice(prod,[...activeStores]);
  const worstP=getWorstPrice(prod,[...activeStores]);
  const worstId=storeArr.reduce((a,b)=>getEffPrice(prod,b.id)>getEffPrice(prod,a.id)?b:a).id;
  const sorted=[...storeArr].sort((a,b)=>getEffPrice(prod,a.id)-getEffPrice(prod,b.id));
  function priceColor(pct){
    if(pct<0.5){const t=pct*2;return `rgb(${Math.round(80+120*t)},${Math.round(160-30*t)},${Math.round(80-10*t)})`;}
    else{const t=(pct-0.5)*2;return `rgb(${Math.round(200+24*t)},${Math.round(130-80*t)},${Math.round(70-20*t)})`;}
  }
  return (
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {sorted.map((store,idx)=>{
        const regPrice=prod.prices[store.id],salePrice=prod.sale&&prod.sale[store.id],hasSale=!!salePrice;
        const price=hasSale?salePrice:regPrice;
        const isBest=store.id===bestId,isWorst=store.id===worstId&&bestId!==worstId;
        const diff=price-bestP;
        const pricePct=bestP===worstP?0:(price-bestP)/(worstP-bestP);
        const clr=priceColor(pricePct);
        const dotPos=Math.round(pricePct*100);
        const showBar=sorted.length>=3;
        return (
          <div key={store.id} style={{padding:"9px 0",borderBottom:idx<sorted.length-1?"1px solid var(--border)":"none"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showBar?5:0}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <ChainLogo chainId={store.id} size={20}/>
                <span style={{fontFamily:"'Inter',-apple-system,sans-serif",fontSize:13,fontWeight:700,color:store.color}}>{store.name}</span>
                {hasSale&&<span className="sale-tag">SALE</span>}
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                {hasSale&&<span style={{fontSize:11,textDecoration:"line-through",color:"var(--text-3)",fontFamily:"'Inter',-apple-system,sans-serif"}}>{fmt(regPrice)}</span>}
                <span style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontWeight:800,fontSize:17,color:isBest?"var(--green)":isWorst?"#E05050":"var(--text)"}}>{fmt(price)}</span>
                {!showBar&&<span style={{fontSize:10,fontFamily:"'Inter',-apple-system,sans-serif",color:isBest?"var(--green)":isWorst?"#E05050":"var(--text-3)"}}>
                  {isBest&&sorted.length>1&&("✓")}
                  {isWorst&&sorted.length>1&&("+"+fmt(diff))}
                </span>}
                {prod.up&&prod.up[store.id]!=null&&<span style={{fontSize:10,color:"var(--text-3)",fontFamily:"'Inter',-apple-system,sans-serif"}}>{fmt(prod.up[store.id])}/{prod.ut||"кг"}</span>}
              </div>
            </div>
            {showBar&&<div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1,position:"relative",height:16,display:"flex",alignItems:"center"}}>
                <div style={{position:"absolute",left:0,right:0,height:3,borderRadius:2,background:"linear-gradient(90deg, #4CAF50 0%, #FFC107 50%, #E05050 100%)",opacity:0.2}}/>
                <div style={{position:"absolute",left:0,width:Math.max(dotPos,1)+"%",height:3,borderRadius:2,background:clr}}/>
                <div style={{position:"absolute",left:"calc("+dotPos+"% - 6px)",width:12,height:12,borderRadius:"50%",background:clr,border:"2.5px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,0.18)",transition:"left 0.3s"}}/>
              </div>
              <div style={{minWidth:100,textAlign:"right",fontSize:10,fontFamily:"'Inter',-apple-system,sans-serif"}}>
                {isBest&&<span style={{color:"var(--green)",fontWeight:800}}>✓ {lang==="BG"?"Най-евтино":"Cheapest"}</span>}
                {isWorst&&<span style={{color:"#E05050",fontWeight:700}}>+{fmt(diff)} {lang==="BG"?"повече":"more"}</span>}
                {!isBest&&!isWorst&&diff>0.01&&<span style={{color:"var(--text-3)"}}>+{fmt(diff)}</span>}
                {prod.up&&prod.up[store.id]!=null&&<span style={{color:"var(--text-3)",marginLeft:6}}>{fmt(prod.up[store.id])}/{prod.ut||"кг"}</span>}
              </div>
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ─── ONBOARDING STEP ──────────────────────────────────────────────────────────
function OnboardStep({cat,prefs,setPrefs,stepNum,isLast,onNext,onSkip,lang="BG"}){
  const meta=CAT_META[cat]||{hasFat:false,hasBrand:false,sizes:[]};
  const cp=prefs[cat]||{anyBrand:true,brands:[],excludedBrands:[],anyFat:true,fats:[],sizes:[]};
  const set=(k,v)=>setPrefs(prev=>({...prev,[cat]:{...cp,[k]:v}}));

  // Smart cascading: compute available options from actual product data
  const opts = getFilteredOptions(cat, cp, PRODUCTS);

  // 3-state brand toggle: unselected → selected → excluded → unselected
  const cycleBrand = (b) => {
    const isWanted = cp.brands.includes(b);
    const isExcluded = cp.excludedBrands?.includes(b);
    if (!isWanted && !isExcluded) {
      // → Select it
      set("brands", [...cp.brands, b]);
    } else if (isWanted) {
      // → Exclude it
      setPrefs(prev => ({...prev, [cat]: {
        ...cp,
        brands: cp.brands.filter(x => x !== b),
        excludedBrands: [...(cp.excludedBrands||[]), b]
      }}));
    } else {
      // → Deselect (remove from excluded)
      set("excludedBrands", (cp.excludedBrands||[]).filter(x => x !== b));
    }
  };

  // Auto-clean: remove invalid fat/size selections when they're no longer available
  const availFatVals = new Set(opts.fats.map(f => f.value));
  const availSizeVals = new Set(opts.sizes.map(s => s.value));
  const cleanFats = cp.fats?.filter(f => availFatVals.has(f)) || [];
  const cleanSizes = cp.sizes?.filter(s => availSizeVals.has(s)) || [];
  if (cleanFats.length !== (cp.fats||[]).length || cleanSizes.length !== (cp.sizes||[]).length) {
    // Schedule cleanup on next tick to avoid render loop
    setTimeout(() => setPrefs(prev => ({...prev, [cat]: {...(prev[cat]||cp), fats: cleanFats, sizes: cleanSizes}})), 0);
  }

  const pname = p => lang==="BG" ? (p.nameBG||p.name||p.nameEN) : (p.nameEN||p.name);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:22}}>
        <div style={{fontSize:36}}>{CAT_ICONS[cat]}</div>
        <div>
          <div style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontSize:21,fontWeight:800,color:"var(--text)"}}>{lang==="BG"?CAT_BG[cat]||cat:cat}</div>
          <div style={{fontSize:12,color:"var(--text-3)",fontFamily:"'Inter',-apple-system,sans-serif",marginTop:2}}>{lang==="BG"?"Персонализирай какво проследяваме":"Customize what we track for you"}</div>
        </div>
      </div>

      {/* ── BRAND PREFERENCE ── */}
      {meta.hasBrand&&opts.brands.length>1&&<div style={{marginBottom:18}}>
        <div style={{fontSize:10,color:"var(--text-2)",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'Inter',-apple-system,sans-serif",marginBottom:8}}>{lang==="BG"?"Предпочитание за марка":"Brand preference"}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <Chip label={lang==="BG"?"Всяка марка — най-добра цена":"Any brand — best price"} selected={cp.anyBrand} onToggle={()=>set("anyBrand",true)} color="var(--green)"/>
          <Chip label={lang==="BG"?"Само конкретни марки":"Specific brands only"} selected={!cp.anyBrand} onToggle={()=>set("anyBrand",false)}/>
        </div>
        {!cp.anyBrand&&<>
          <div style={{fontSize:10,color:"var(--text-3)",fontFamily:"'Inter',-apple-system,sans-serif",marginBottom:6,marginTop:4}}>
            {lang==="BG"?"Натисни: избери · отново: изключи · трети път: нулирай":"Tap: select · again: exclude · third: reset"}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {opts.brands.map(b => {
              const isWanted = cp.brands.includes(b.name);
              const isExcluded = cp.excludedBrands?.includes(b.name);
              return <Chip key={b.name} label={b.name} count={b.count}
                selected={isWanted} excluded={isExcluded}
                onToggle={()=>cycleBrand(b.name)}/>;
            })}
          </div>
        </>}
      </div>}

      {/* ── FAT CONTENT (cascading from brand selection) ── */}
      {meta.hasFat&&opts.fats.length>0&&<div style={{marginBottom:18}}>
        <div style={{fontSize:10,color:"var(--text-2)",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'Inter',-apple-system,sans-serif",marginBottom:8}}>
          {lang==="BG"?"Съдържание на мазнини":"Fat content"}
          {!cp.anyBrand&&cp.brands.length>0&&<span style={{color:"var(--text-3)",fontWeight:400,textTransform:"none",letterSpacing:0}}> — {lang==="BG"?"за избраните марки":"for selected brands"}</span>}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
          <Chip label={lang==="BG"?"Всеки % мазнини":"Any fat %"} selected={cp.anyFat} onToggle={()=>set("anyFat",true)} color="var(--green)"/>
          <Chip label={lang==="BG"?"Конкретен %":"Specific %"} selected={!cp.anyFat} onToggle={()=>set("anyFat",false)}/>
        </div>
        {!cp.anyFat&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {opts.fats.map(f=><Chip key={f.value} label={f.value+"%"} count={f.count}
            selected={cp.fats?.includes(f.value)}
            disabled={f.count===0}
            onToggle={()=>set("fats",cp.fats?.includes(f.value)?cp.fats.filter(x=>x!==f.value):[...(cp.fats||[]),f.value])}/>)}
        </div>}
      </div>}

      {/* ── SIZES (cascading from brand + fat selection) ── */}
      {opts.sizes.length>0&&<div style={{marginBottom:18}}>
        <div style={{fontSize:10,color:"var(--text-2)",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'Inter',-apple-system,sans-serif",marginBottom:6}}>
          {lang==="BG"?"Предпочитани размери":"Preferred sizes"}
          {(!cp.anyBrand&&cp.brands.length>0)||(!cp.anyFat&&cp.fats?.length>0)
            ?<span style={{color:"var(--text-3)",fontWeight:400,textTransform:"none",letterSpacing:0}}> — {lang==="BG"?"налични за избраното":"available for selection"}</span>
            :null}
        </div>
        <div style={{fontSize:11,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",marginBottom:8}}>{lang==="BG"?"💡 Повече размери = по-добро сравнение":"💡 More sizes = better value comparisons"}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {opts.sizes.map(s=><Chip key={s.value} label={s.value} count={s.count}
            selected={cp.sizes?.includes(s.value)}
            disabled={s.count===0}
            onToggle={()=>set("sizes",cp.sizes?.includes(s.value)?cp.sizes.filter(x=>x!==s.value):[...(cp.sizes||[]),s.value])}/>)}
        </div>
      </div>}

      {/* ── LIVE MATCH COUNTER ── */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"10px 14px",background:opts.matchCount===0?"#E0505015":"var(--savings-hero-bg)",border:`1px solid ${opts.matchCount===0?"#E05050":"var(--savings-border)"}`,borderRadius:10}}>
        <span style={{fontSize:18}}>{opts.matchCount===0?"⚠️":"✨"}</span>
        <span style={{fontFamily:"'Inter',-apple-system,sans-serif",fontSize:13,color:opts.matchCount===0?"#E05050":"var(--green)",fontWeight:700}}>
          {opts.matchCount===0
            ?(lang==="BG"?"Няма продукти за тази комбинация":"No products match this combination")
            :(lang==="BG"?`${opts.matchCount} продукта отговарят`:`${opts.matchCount} product${opts.matchCount!==1?"s":""} match`)}
        </span>
        {opts.matchCount>0&&opts.matchCount<opts.totalInCategory&&<span style={{fontSize:11,color:"var(--text-3)",fontFamily:"'Inter',-apple-system,sans-serif"}}>
          {lang==="BG"?`от ${opts.totalInCategory}`:`of ${opts.totalInCategory}`}
        </span>}
      </div>

      {/* ── PRODUCT PREVIEW (filtered) ── */}
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:20,paddingBottom:4}}>
        {(opts.matchCount>0?opts.matchedProducts:PRODUCTS.filter(p=>p.category===cat)).slice(0,5).map(prod=>(
          <div key={prod.id} style={{flexShrink:0,width:86,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:10,padding:9,textAlign:"center"}}>
                        <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"'Inter',-apple-system,sans-serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:70}}>{prod.brand||""}</div>
            <div style={{fontSize:9,color:"var(--text-3)",fontFamily:"'Inter',-apple-system,sans-serif"}}>{prod.size||""}</div>
            <div style={{fontSize:13,color:"var(--green)",fontFamily:"'Noto Serif JP',Georgia,serif",fontWeight:800,marginTop:2}}>{fmt(getBestPrice(prod,STORE_IDS))}</div>
          </div>
        ))}
      </div>

      {/* ── NAVIGATION ── */}
      <div style={{display:"flex",gap:10}}>
        <button onClick={onNext} style={{flex:1,background:opts.matchCount===0?"#555":"var(--accent)",border:"none",borderRadius:8,padding:"14px 20px",fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:900,fontSize:14,color:opts.matchCount===0?"#999":"var(--accent-text)",cursor:"pointer"}}>
          {isLast ? (lang==="BG" ? "✓ Готово" : "✓ Finish Setup") : (lang==="BG" ? `Напред: ${ONBOARD_CATS[stepNum+1]} →` : `Next: ${ONBOARD_CATS[stepNum+1]} →`)}

// ─── SHARE LIST PANEL ────────────────────────────────────────────────────────
function SharePanel({listItems, storeBreakdown, activeArr, getQty, lang, onClose}){
  const [copied, setCopied] = React.useState(false);

  function buildShareText(){
    const lines = [];
    const date = new Date().toLocaleDateString(lang==="BG"?"bg-BG":"en-GB",{day:"numeric",month:"long"});
    lines.push(lang==="BG"?`🛒 Моят Списък — Spesti (${date})`:`🛒 My Shopping List — Spesti (${date})`);
    lines.push("");
    storeBreakdown.forEach(store=>{
      if(!store.items.length) return;
      const total = store.items.reduce((s,p)=>s+(getEffPrice(p,store.id)||0)*getQty(p.id),0);
      lines.push(`📍 ${store.name} — ${fmt(total)}`);
      store.items.forEach(p=>{
        const qty = getQty(p.id);
        const name = lang==="BG"?(p.nameBG||p.name||p.nameEN):(p.nameEN||p.name);
        const price = fmt((getEffPrice(p,store.id)||0)*qty);
        lines.push(`  ${qty>1?qty+"× ":""}${name} → ${price}`);
      });
      lines.push("");
    });
    // items not assigned to any store
    const assignedIds = new Set(storeBreakdown.flatMap(s=>s.items.map(p=>p.id)));
    const unassigned = listItems.filter(p=>!assignedIds.has(p.id));
    if(unassigned.length){
      lines.push(lang==="BG"?"📦 Останали:":"📦 Other items:");
      unassigned.forEach(p=>{
        const qty = getQty(p.id);
        lines.push(`  ${qty>1?qty+"× ":""}${lang==="BG"?(p.nameBG||p.name||p.nameEN):(p.nameEN||p.name)}`);
      });
      lines.push("");
    }
    const total = listItems.reduce((s,p)=>s+(getBestPrice(p,activeArr)||0)*getQty(p.id),0);
    lines.push(lang==="BG"?`💰 Общо оптимално: ${fmt(total)}`:`💰 Optimised total: ${fmt(total)}`);
    lines.push(lang==="BG"?"Генерирано от spesti.bg":"via spesti.bg");
    return lines.join("\n");
  }

  const text = buildShareText();

  function copyToClipboard(){
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200);});
    } else {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>setCopied(false),2200);
    }
  }

  const waText = encodeURIComponent(text);
  const waUrl = `https://wa.me/?text=${waText}`;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"flex-end"}} onClick={onClose}>
      <div style={{width:"100%",background:"var(--bg)",borderRadius:"18px 18px 0 0",padding:"22px 20px 36px",maxWidth:600,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontWeight:800,fontSize:17,color:"var(--text)"}}>
            {lang==="BG"?"📤 Сподели Списъка":"📤 Share Your List"}
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-3)",fontSize:22,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        <div style={{background:"var(--bg-deep)",border:"1px solid var(--border)",borderRadius:10,padding:"11px 13px",marginBottom:14,maxHeight:180,overflowY:"auto"}}>
          <pre style={{fontFamily:"'Inter',-apple-system,sans-serif",fontSize:11,color:"var(--text-muted)",lineHeight:1.6,whiteSpace:"pre-wrap",margin:0}}>{text}</pre>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {/* Native Share (mobile) */}
          {navigator.share&&<button className="share-btn" onClick={()=>navigator.share({title:lang==="BG"?"Списък за Пазаруване":"Shopping List",text:text}).catch(()=>{})} style={{width:"100%",justifyContent:"center",background:"var(--accent)",color:"var(--accent-text)"}}>
            <span style={{fontSize:16}}>📤</span> {lang==="BG"?"Сподели…":"Share…"}
          </button>}
          <div style={{display:"flex",gap:8}}>
            <a href={waUrl} target="_blank" rel="noopener" style={{flex:1,textDecoration:"none"}}>
              <button className="share-btn" style={{width:"100%",justifyContent:"center"}}>
                <span style={{fontSize:16}}>💬</span> WhatsApp
              </button>
            </a>
            <a href={`viber://forward?text=${waText}`} style={{flex:1,textDecoration:"none"}}>
              <button className="share-btn" style={{width:"100%",justifyContent:"center"}}>
                <span style={{fontSize:16}}>📲</span> Viber
              </button>
            </a>
            <button className="share-btn copy" onClick={copyToClipboard} style={{flex:1,justifyContent:"center"}}>
              <span style={{fontSize:14}}>{copied?"✓":"📋"}</span> {copied?(lang==="BG"?"Копирано!":"Copied!"):(lang==="BG"?"Копирай":"Copy")}
            </button>
          </div>
          <a href={`sms:?body=${waText}`} style={{textDecoration:"none"}}>
            <button className="share-btn" style={{width:"100%",justifyContent:"center"}}>
              <span style={{fontSize:16}}>💌</span> {lang==="BG"?"Изпрати SMS":"Send SMS"}
            </button>
          </a>
        </div>
      </div>
    </div>
  );
}

// ─── TREND PANEL ─────────────────────────────────────────────────────────────
function TrendPanel({hist, lang}){
  const chg = hist[hist.length-1] - hist[0];
  const color = chg>0.005 ? "#E05050" : chg<-0.005 ? "var(--green)" : "var(--text-muted)";
  const trendTxt = lang==="BG"
    ? (chg>0.005 ? "↑ нагоре" : chg<-0.005 ? "↓ надолу" : "стабилно") + " пр. 8 седм."
    : (chg>0.005 ? "↑ up" : chg<-0.005 ? "↓ down" : "stable") + " vs 8w ago";
  const lowPrice = Math.min(...hist);
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,padding:"8px 10px",background:"var(--bg-deep)",borderRadius:8}}>
      <div style={{flex:1}}>
        <div style={{fontSize:9,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:4}}>{lang==="BG"?"8-СЕДМИЧНА ТЕНДЕНЦИЯ":"8-WEEK TREND"}</div>
        <Sparkline data={hist} width={120} height={28}/>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:11,fontWeight:700,color:color,fontFamily:"'Inter',-apple-system,sans-serif"}}>{trendTxt}</div>
        <div style={{fontSize:9,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",marginTop:2}}>{lang==="BG"?"мин:":"low:"} {fmt(lowPrice)}</div>
      </div>
    </div>
  );
}

// ─── SPESTI SCORE CARD ────────────────────────────────────────────────────────
function SpestiScoreCard({savings, worstTotal, listCount, lang}){
  const sc = spestiScore(savings, worstTotal, listCount);
  if(sc===null) return null;
  const color = sc>=80 ? "var(--accent)" : sc>=60 ? "var(--green)" : "var(--text-muted)";
  const label = lang==="BG"
    ? (sc>=80?"🏆 Отличен спестявач!":sc>=60?"👍 Добра ефективност":"💪 Има резерви")
    : (sc>=80?"🏆 Excellent saver!":sc>=60?"👍 Good efficiency":"💪 Room to improve");
  const hint = lang==="BG"
    ? (sc<80?"Избери повече продукти от най-евтиния магазин":"Използваш Spesti като про")
    : (sc<80?"Select more items at cheapest store to improve":"You're using Spesti like a pro");
  return (
    <div style={{display:"flex",alignItems:"center",gap:14,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
      <div style={{textAlign:"center",flexShrink:0,minWidth:54}}>
        <div style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontSize:40,fontWeight:900,color:color,lineHeight:1}}>{sc}</div>
        <div style={{fontSize:7,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",letterSpacing:"2px",textTransform:"uppercase",marginTop:2}}>{lang==="BG"?"SPESTI РЕЗУЛТАТ":"SPESTI SCORE"}</div>
      </div>
      <div style={{width:1,height:44,background:"var(--bg-card)",flexShrink:0}}/>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Inter',-apple-system,sans-serif",fontSize:13,color:"var(--text)",fontWeight:700,marginBottom:5}}>{label}</div>
        <div style={{background:"var(--bg-card)",borderRadius:4,height:5,marginBottom:4,overflow:"hidden"}}>
          <div style={{width:sc+"%",height:"100%",background:color,borderRadius:4}}/>
        </div>
        <div style={{fontSize:10,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif"}}>{hint}</div>
      </div>
    </div>
  );
}

function Spesti(){

    try{ const p=localStorage.getItem('spesti_phase'); return p||"welcome"; }catch(e){ return "welcome"; }

    try{ const s=localStorage.getItem('spesti_stores'); if(s) return new Set(JSON.parse(s)); }catch(e){}
    return new Set(STORE_IDS);
  });
  const [userLoc,setUserLoc]     = useState(null);

    try{ return localStorage.getItem('spesti_lang')||"BG"; }catch(e){ return "BG"; }
  });
  const [dataLoaded,setDataLoaded] = useState(_dataReady);
  useEffect(()=>{ onDataReady(()=>setDataLoaded(true)); },[]);
  const [view,setView]           = useState("list");
  // v2.25: Multi-list with localStorage persistence
  const _initLists = ()=>{
    try {
      const raw = localStorage.getItem('spesti_lists');
      if(raw){
        const d = JSON.parse(raw);
        if(d && d.lists && d.lists.length > 0) {
          // Migrate English names → Bulgarian
          const nameMap = {"Weekly Groceries":"Тази Седмица","This Week":"Тази Седмица","My Cart":"Моята Количка","New Cart":"Нова Количка","My List":"Моят Списък"};
          d.lists.forEach(l=>{ if(nameMap[l.name]) l.name = nameMap[l.name]; });
          return d;
        }
      }
      // Migrate old single list if exists
      const oldList = localStorage.getItem('spesti_list');
      if(oldList){
        const items = JSON.parse(oldList);
        const oldQtys = JSON.parse(localStorage.getItem('spesti_qtys')||'{}');
        return { activeId:"list_migrated", lists:[{id:"list_migrated",name:"Моят Списък",items:items,quantities:oldQtys,created:new Date().toISOString().slice(0,10)}] };
      }
    } catch(e){}
    // Default: one list with starter items
    return { activeId:"list_default", lists:[{id:"list_default",name:"Тази Седмица",items:DEFAULT_LIST,quantities:{},created:new Date().toISOString().slice(0,10)}] };
  };
  const [listsData, setListsData] = useState(_initLists);
  const activeList = listsData.lists.find(l=>l.id===listsData.activeId) || listsData.lists[0];
  const weeklyList = new Set(activeList ? activeList.items : []);
  const quantities = activeList ? (activeList.quantities||{}) : {};
  // Persist to localStorage on every change
  useEffect(()=>{ try{localStorage.setItem('spesti_lists',JSON.stringify(listsData));}catch(e){} },[listsData]);
  // Setters that update listsData
  const setList = updater => setListsData(prev=>{
    const nx = {...prev, lists: prev.lists.map(l=>l.id===prev.activeId ? {...l, items: Array.from(typeof updater==='function' ? updater(new Set(l.items)) : updater)} : l)};
    return nx;
  });
  const setQtys = updater => setListsData(prev=>{
    const nx = {...prev, lists: prev.lists.map(l=>l.id===prev.activeId ? {...l, quantities: typeof updater==='function' ? updater(l.quantities||{}) : updater} : l)};
    return nx;
  });
  const [search,setSearch]       = useState("");
  const [selCat,setSelCat]       = useState("All");
  const [expandedId,setExpId]    = useState(null);
  const [selStore,setSelStore]   = useState(null);
  const [animIn,setAnimIn]       = useState(false);
  const [showListMgr, setShowListMgr] = useState(false);
  const [editingListId, setEditingListId] = useState(null);
  const createList = (name)=>{
    const id = "list_"+Date.now();
    const created = new Date().toISOString().slice(0,10);
    setListsData(prev=>({activeId:id, lists:[{id,name:name||(lang==="BG"?"Нова Количка":"New Cart"),items:[],quantities:{},created},...prev.lists]}));
  };
  const switchList = (id)=> setListsData(prev=>({...prev, activeId:id}));
  const renameList = (id,name)=> setListsData(prev=>({...prev, lists:prev.lists.map(l=>l.id===id?{...l,name}:l)}));
  const deleteList = (id)=> setListsData(prev=>{
    const remaining = prev.lists.filter(l=>l.id!==id);
    if(remaining.length===0) return {activeId:"list_default",lists:[{id:"list_default",name:"Тази Седмица",items:[],quantities:{},created:new Date().toISOString().slice(0,10)}]};
    return {activeId:remaining[0].id, lists:remaining};
  });
  // Persist stores + lang + phase to localStorage
  useEffect(()=>{ try{localStorage.setItem('spesti_phase',phase);}catch(e){} },[phase]);
  useEffect(()=>{ try{localStorage.setItem('spesti_stores',JSON.stringify([...activeStores]));}catch(e){} },[activeStores]);
  useEffect(()=>{ try{localStorage.setItem('spesti_lang',lang);}catch(e){} },[lang]);
  const [watchlist,setWatch]     = useState(new Set());
  const [sortMode,setSortMode]   = useState("savings");
  const [showStoreMgr,setStoreMgr] = useState(false);
  const [showShare,setShowShare]   = useState(false);
  const [showMenu,setShowMenu]     = useState(false);
  const [toast,setToast]           = useState(null);

  const [maxStores,setMaxStores]   = useState(null); // null = no limit (best savings)

  const toggleChecked = id => setCheckedItems(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });
  const [selSubcat,setSelSubcat] = useState([]);
  const [selSc2,setSelSc2]       = useState("All"); // v2.9: sub-subcategory filter
  const [selFats,setSelFats]     = useState(new Set()); // v2.22: multi-select fat % filters

  useEffect(()=>{ setTimeout(()=>setAnimIn(true),80); },[]);
  useEffect(()=>{ setShowAllProds(false); setSelSubcat([]); setSelSc2("All"); setSelFats(new Set()); },[selCat,search]);
  useEffect(()=>{ setSelSc2("All"); },[selSubcat]);
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.body.style.background = '';
    try{localStorage.setItem('spesti_dark',String(dark));}catch(e){}
  },[dark]);

  const activeArr = [...activeStores];
  const activeChains = ALL_CHAINS.filter(c=>activeStores.has(c.id));

  const pname = prod => lang==="BG"?(prod.nameBG||prod.name||prod.nameEN):(prod.nameEN||prod.name);
  const getQty = id => quantities[id]||1;
  const toggleItem = id => {
    setList(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });
    // v2.26: Track shopping history — record every ADD with timestamp for personalization
    if(!weeklyList.has(id)){
      try{
        const hist = JSON.parse(localStorage.getItem('spesti_history')||'{}');
        const p = PRODUCTS.find(pr=>pr.id===id);
        if(p){
          if(!hist[id]) hist[id] = {count:0, cat:p.category, brand:p.brand||'', first:Date.now()};
          hist[id].count++;
          hist[id].last = Date.now();
          localStorage.setItem('spesti_history', JSON.stringify(hist));
        }
      }catch(e){}
    }
  };
  const toggleWatch = id => setWatch(prev=>{ const nx=new Set(prev); nx.has(id)?nx.delete(id):nx.add(id); return nx; });

  const applyPrefs = prod=>{
    const cp=prefs[prod.category]; if(!cp) return true;
    if(!cp.anyBrand&&cp.brands.length>0&&!cp.brands.includes(prod.brand)) return false;
    if(cp.excludedBrands?.includes(prod.brand)) return false;
    if(!cp.anyFat&&cp.fats?.length>0&&prod.fatPct&&!cp.fats.includes(prod.fatPct)) return false;
    if(cp.sizes?.length>0&&prod.size&&!cp.sizes.includes(prod.size)) return false;
    return true;
  };

  // Only include products that have at least one price in user's active stores
  const visibleProds = useMemo(()=>PRODUCTS.filter(p=>applyPrefs(p)&&activeArr.some(id=>p.prices[id]!=null)),[prefs,activeStores,dataLoaded]);
  // v2.21: Compute available subcategories for selected category
  const subcats = useMemo(()=>{
    if(selCat==="All") return [];
    const counts = {};
    visibleProds.forEach(p=>{
      if(p.category===selCat && p.sc){
        counts[p.sc] = (counts[p.sc]||0) + 1;
      }
    });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count}));

  const _latinToCyr = (s) => {
    if(!/[a-zA-Z]/.test(s)) return s;
    const low = s.toLowerCase();
    // Check word dictionary first
    if(_LATIN_WORDS[low]) return _LATIN_WORDS[low];
    // Multi-word: transliterate each word
    const words = low.split(/\s+/);
    if(words.length > 1) {
      const mapped = words.map(w => _LATIN_WORDS[w] || w);
      if(mapped.some((m,i) => m !== words[i])) return mapped.join(' ');
    }
    // Phonetic transliteration fallback
    let r = low;
    r = r.replace(/sht/g,'щ').replace(/zh/g,'ж').replace(/ch/g,'ч').replace(/sh/g,'ш').replace(/ts/g,'ц').replace(/yu/g,'ю').replace(/ya/g,'я');
    r = r.replace(/a/g,'а').replace(/b/g,'б').replace(/v/g,'в').replace(/g/g,'г').replace(/d/g,'д').replace(/e/g,'е').replace(/z/g,'з').replace(/i/g,'и').replace(/y/g,'й').replace(/k/g,'к').replace(/l/g,'л').replace(/m/g,'м').replace(/n/g,'н').replace(/o/g,'о').replace(/p/g,'п').replace(/r/g,'р').replace(/s/g,'с').replace(/t/g,'т').replace(/u/g,'у').replace(/f/g,'ф').replace(/h/g,'х');
    return r;
  };

  const _expandSearch = (q) => {
    const syn = SEARCH_SYNONYMS[q];
    if(syn) {
      const terms = [q, ...syn.split(",")];
      // Also add plural/singular variants
      const alt = _PLURAL_MAP[q];
      if(alt) terms.push(alt);
      return [...new Set(terms)];
    }
    // Partial match: check if query is a substring of any synonym key
    for(const [key,vals] of Object.entries(SEARCH_SYNONYMS)){
      if(key.includes(q) || q.includes(key)) {
        const terms = [q, ...vals.split(",")];
        const alt = _PLURAL_MAP[q];
        if(alt) terms.push(alt);
        return [...new Set(terms)];
      }
    }
    // Also check if query matches any synonym VALUE (reverse lookup)
    for(const [key,vals] of Object.entries(SEARCH_SYNONYMS)){
      const valArr = vals.split(",");
      if(valArr.some(v => v.trim()===q || v.trim().includes(q) || q.includes(v.trim()))) {
        const terms = [q, key, ...valArr];
        const alt = _PLURAL_MAP[q];
        if(alt) terms.push(alt);
        return [...new Set(terms)];
      }
    }
    // Multi-word: try each word separately
    const words = q.split(/\s+/);
    if(words.length > 1) {
      let allTerms = [q];
      for(const w of words) {
        if(w.length < 2) continue;
        // Add plural/singular variant of each word
        const alt = _PLURAL_MAP[w];
        if(alt) allTerms.push(alt);
        const wSyn = SEARCH_SYNONYMS[w];
        if(wSyn) allTerms.push(...wSyn.split(","));
        else {
          for(const [key,vals] of Object.entries(SEARCH_SYNONYMS)){
            if(key.includes(w) || w.includes(key)) { allTerms.push(...vals.split(",")); break; }
          }
        }
      }
      if(allTerms.length > 1) return [...new Set(allTerms)];
    }
    // Single word: try plural/singular
    const alt = _PLURAL_MAP[q];
    if(alt) return [q, alt];
    return [q];
  };

    if(selSubcat.length>0) items = items.filter(p=>selSubcat.includes(p.sc||""));
    // v2.9: Filter by sub-subcategory
    if(selSc2!=="All") items = items.filter(p=>p.sc2===selSc2);
    // v2.22: Filter by fat % (multi-select, normalized)
    if(selFats.size>0) items = items.filter(p=>p.fatPct&&selFats.has(_normFat(p.fatPct)));
    // Apply sort
    if(sortMode==="savings") return [...items].sort((a,b)=>((getWorstPrice(b,activeArr)||0)-(getBestPrice(b,activeArr)||0))-((getWorstPrice(a,activeArr)||0)-(getBestPrice(a,activeArr)||0)));
    if(sortMode==="price")   return [...items].sort((a,b)=>(getBestPrice(a,activeArr)||0)-(getBestPrice(b,activeArr)||0));
    if(sortMode==="unitprice") return [...items].sort((a,b)=>getBestUnitPrice(a,activeArr)-getBestUnitPrice(b,activeArr));
    if(sortMode==="az") return [...items].sort((a,b)=>pname(a).localeCompare(pname(b)));
    return items;
  },[visibleProds,search,selCat,selSubcat,selSc2,selFats,lang,sortMode,activeStores]);

  // v2.21: Best Value Recommender — hero card + top 5 + browse all
  const { heroProduct, displayProds, remainingCount, avgUnitPrice } = useMemo(()=>{
    const hasCat = selCat !== "All";
    const hasSearch = !!search;
    // Search active → show all, no hero
    if(hasSearch) return { heroProduct:null, displayProds:searchProds, remainingCount:0, avgUnitPrice:0 };
    // "All" with no search → no truncation (weekly deals show instead)
    if(!hasCat) return { heroProduct:null, displayProds:searchProds, remainingCount:0, avgUnitPrice:0 };
    // Category selected, no search → recommend best value
    // Filter out bulk/wholesale items (>3kg or >5L) from recommendations
    // Filter bulk items from HERO only — they still appear in "ОЩЕ ОПЦИИ" list
    const retail = searchProds.filter(isRetailProduct);
    // When "Всички" subcategory or no subcategory filter, only compare same unit type
    // Find dominant unit type (кг, л, or бр) to avoid comparing apples and oranges
    const hasSubcatFilter = selSubcat.length > 0;
    let heroPool = retail;
    if(!hasSubcatFilter){
      const utCounts = {};
      retail.forEach(p=>{ if(p.ut) utCounts[p.ut]=(utCounts[p.ut]||0)+1; });
      const dominantUT = Object.entries(utCounts).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
      if(dominantUT) heroPool = retail.filter(p=>p.ut===dominantUT);
    }
    const byUP = [...heroPool].sort((a,b)=>getBestUnitPrice(a,activeArr)-getBestUnitPrice(b,activeArr));
    const hero = byUP[0] && getBestUnitPrice(byUP[0],activeArr) < Infinity ? byUP[0] : null;
    // Runners include ALL products (including bulk), minus the hero, sorted by unit price
    const allByUP = [...searchProds].sort((a,b)=>getBestUnitPrice(a,activeArr)-getBestUnitPrice(b,activeArr));
    const runners = hero ? allByUP.filter(p=>p.id!==hero.id) : allByUP;
    // Average unit price for "% cheaper" stat — same unit type only
    let sum=0,cnt=0;
    byUP.forEach(p=>{ const u=getBestUnitPrice(p,activeArr); if(u<Infinity){sum+=u;cnt++;}});
    const avg = cnt>0 ? sum/cnt : 0;
    const SHOW_COUNT = 5;
    // When browsing all, show ALL products minus hero, retail first then bulk
    const allSorted = showAllProds ? [...searchProds].filter(p=>!hero||p.id!==hero.id).sort((a,b)=>{
      const aRetail = isRetailProduct(a) ? 0 : 1;
      const bRetail = isRetailProduct(b) ? 0 : 1;
      if(aRetail !== bRetail) return aRetail - bRetail;
      return getBestUnitPrice(a,activeArr) - getBestUnitPrice(b,activeArr);
    }) : null;
    const visible = showAllProds ? allSorted : runners.slice(0, SHOW_COUNT);
    return {
      heroProduct: hero,
      displayProds: visible,
      remainingCount: showAllProds ? 0 : Math.max(0, searchProds.length - SHOW_COUNT - 1),
      avgUnitPrice: avg
    };
  },[searchProds,selCat,search,showAllProds,activeStores,sortMode]);

  const listItems      = PRODUCTS.filter(p=>weeklyList.has(p.id));
  const worstTotal     = listItems.reduce((s,p)=>s+(getWorstPrice(p,activeArr)||0)*getQty(p.id),0);
  const fullOptTotal   = listItems.reduce((s,p)=>s+(getBestPrice(p,activeArr)||0)*getQty(p.id),0);

  // Pre-compute trip options for 1, 2, 3 stores + all
  // Includes realTotal that accounts for comparable product prices
  const tripOptions = useMemo(() => {
    if (!listItems.length) return [];
    const storesWithItems = activeArr.filter(sid => listItems.some(p => p.prices[sid] != null));
    const opts = [];
    for (let k = 1; k <= Math.min(3, storesWithItems.length - 1); k++) {
      const result = optimizeStoreLimit(listItems, activeArr, k, getQty);
      // Compute real total with comparable prices
      let realTotal = 0;
      const effStores = result.stores;
      listItems.forEach(p => {
        const best = getBestStore(p, effStores);
        if (best && p.prices[best] != null) {
          realTotal += getEffPrice(p, best) * getQty(p.id);
        } else {
          // Unavailable — try comparable at first effective store
          const fallback = effStores[0];
          const comp = fallback ? findComparable(p, fallback) : null;
          if (comp) {
            realTotal += (getEffPrice(comp, fallback) || 0) * getQty(p.id);
          } else {
            realTotal += (getBestPrice(p, activeArr) || 0) * getQty(p.id);
          }
        }
      });
      opts.push({ maxStores: k, ...result, realTotal: +realTotal.toFixed(2) });
    }
    // "All" option
    opts.push({ maxStores: null, stores: storesWithItems, total: fullOptTotal, realTotal: fullOptTotal, limited: false });
    return opts;
  }, [listItems, activeArr, quantities, fullOptTotal, dataLoaded]);

  // Effective store set: if maxStores is set, use the optimized combo; otherwise use all
  const effectiveStores = useMemo(() => {
    if (maxStores == null) return activeArr;
    const opt = tripOptions.find(o => o.maxStores === maxStores);
    return opt ? opt.stores : activeArr;
  }, [maxStores, tripOptions, activeArr]);

  const storeBreakdown = (()=>{
    // Assign each item to its best store within effectiveStores
    const assigned = new Set();
    const storeItems = {};
    effectiveStores.forEach(sid=>{ storeItems[sid]=[]; });
    // Pass 1: items available in effective stores
    listItems.forEach(p=>{
      const best=getBestStore(p,effectiveStores);
      if(best&&p.prices[best]!=null){ storeItems[best].push(p); assigned.add(p.id); }
    });
    // Pass 2: items NOT available in any effective store — assign to first effective store with a note
    if(maxStores!=null){
      listItems.forEach(p=>{
        if(!assigned.has(p.id)){
          const fallbackStore=effectiveStores[0];
          if(fallbackStore){ storeItems[fallbackStore].push({...p,_unavailable:true}); assigned.add(p.id); }
        }
      });
    }
    return activeChains.filter(c=>effectiveStores.includes(c.id)).map(store=>{
      const items=storeItems[store.id]||[];
      const total=items.reduce((s,p)=>{
        if(p._unavailable){
          const comp=findComparable(p,store.id);
          if(comp){ return s+(getEffPrice(comp,store.id)||0)*getQty(p.id); }
          return s+(getBestPrice(p,activeArr)||0)*getQty(p.id);
        }
        return s+(getEffPrice(p,store.id)||0)*getQty(p.id);
      },0);
      const altTotal=items.reduce((s,p)=>s+(getWorstPrice(p,activeArr)||0)*getQty(p.id),0);
      return {...store,items,total,storeSavings:altTotal-total};
    }).filter(s=>s.items.length>0);
  })();

  const optimizedTotalRaw = maxStores == null ? fullOptTotal : (tripOptions.find(o => o.maxStores === maxStores)?.total || fullOptTotal);
  // Use storeBreakdown total (accounts for comparable prices) when available
  const breakdownTotal = storeBreakdown.reduce((s, st) => s + st.total, 0);
  const optimizedTotal = (maxStores != null && storeBreakdown.length > 0) ? breakdownTotal : optimizedTotalRaw;
  const savings        = worstTotal - optimizedTotal;
  const savingsPct     = worstTotal > 0 ? ((savings / worstTotal) * 100).toFixed(0) : 0;
  const extraCost      = maxStores != null ? (optimizedTotal - fullOptTotal) : 0;

  // v2.25: List view shows only selected items (not full catalog)
  const [listBrowseMode, setListBrowseMode] = useState(false);
  const [listAddCat, setListAddCat] = useState(null); // which category is expanded for quick-add
  const [listAddSubcat, setListAddSubcat] = useState([]); // empty = All, multi-select array
  const [listAddSc2, setListAddSc2] = useState([]);
  const [listAddFat, setListAddFat] = useState([]); // empty = All, multi-select array
  const sortedListProdsFor = cat => {
    const items=visibleProds.filter(p=>{
      if(p.category!==cat) return false;
      // In focused mode (not browse): only show items IN the list
      if(!listBrowseMode && !weeklyList.has(p.id)) return false;
      if(search==="") return true;
      const q=search.toLowerCase();
      const en=(p.nameEN||"").toLowerCase();
      const bg=(p.nameBG||p.name||"").toLowerCase();
      if(q.length<=6&&/^[a-zа-я]+$/i.test(q)){
        try{const re=new RegExp('\\b'+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');return re.test(en)||re.test(bg);}catch(e){}
      }
      return en.includes(q)||bg.includes(q);
    });
    if(sortMode==="savings") return [...items].sort((a,b)=>((getWorstPrice(b,activeArr)||0)-(getBestPrice(b,activeArr)||0))-((getWorstPrice(a,activeArr)||0)-(getBestPrice(a,activeArr)||0)));
    if(sortMode==="price")   return [...items].sort((a,b)=>(getBestPrice(a,activeArr)||0)-(getBestPrice(b,activeArr)||0));
    if(sortMode==="unitprice") return [...items].sort((a,b)=>getBestUnitPrice(a,activeArr)-getBestUnitPrice(b,activeArr));
    return [...items].sort((a,b)=>pname(a).localeCompare(pname(b)));
  };

  const cats=["All",...Object.keys(CAT_ICONS)];

  // ── WELCOME ────────────────────────────────────────────────────────────────
  if(phase==="welcome") return (
    <div style={{minHeight:"100vh",background:dark?"radial-gradient(ellipse at 18% 50%,#231F1C 0%,#1A1816 65%)":"radial-gradient(ellipse at 18% 50%,#F0EDE8 0%,#F5F1EB 65%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:28}}>
      <style>{CSS}</style>
      <div style={{maxWidth:460,textAlign:"center",width:"100%"}}>

        {/* Language + Theme toggle — top right */}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:18}}>
          {/* Dark mode removed — light only */}
          <div className="lang-toggle">
            <button className={"lang-btn"+(lang==="BG"?" active":"")} onClick={()=>setLang("BG")}>БГ</button>
            <button className={"lang-btn"+(lang==="EN"?" active":"")} onClick={()=>setLang("EN")}>EN</button>
          </div>
        </div>

        <div style={{fontSize:46,marginBottom:10}}>🛒</div>
        <div style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontSize:46,fontWeight:900,color:"var(--accent)",lineHeight:1}}>Spesti</div>
        <div style={{fontFamily:"'Inter',-apple-system,sans-serif",fontSize:11,color:"var(--text-2)",letterSpacing:"3px",textTransform:"uppercase",marginTop:7,marginBottom:10}}>
          {lang==="BG"?"Смарт Пазаруване · България":"Smart Grocery Comparison · Bulgaria"}
        </div>

        <div style={{display:"flex",justifyContent:"center",gap:7,marginBottom:28,flexWrap:"wrap"}}>
          {LIVE_CHAINS.map(s=><StoreBadge key={s.id} chainId={s.id} size={26} showName={true}/>)}
        </div>

        <div style={{background:dark?"var(--bg-deep)":"#F0EBE3",border:"1px solid var(--border)",borderRadius:14,padding:20,marginBottom:20,textAlign:"left"}}>
          {lang==="BG"
            ? [["📍","Открива магазините близо до теб и показва само наличните цени"],["💰","Показва точно колко спестяваш всяка седмица"],["🎯","Персонализирано по марки, мазнини и размери"],["📋","Изгражда седмичния ти списък → план за пазаруване по магазин"],["🔜","Още 4 вериги предстоят · 15+ до края на годината"]].map(([ic,tx])=>(
              <div key={tx} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10,fontFamily:"'Inter',-apple-system,sans-serif",fontSize:13,color:"var(--text-2)",lineHeight:1.4}}>
                <span style={{fontSize:17,flexShrink:0}}>{ic}</span>{tx}
              </div>
            ))
            : [["📍","Finds stores near you & shows only available prices"],["💰","Shows exactly how much you save every week"],["🎯","Personalised to your brands, fat % and sizes"],["📋","Builds your weekly list → store-by-store shopping plan"],["🔜","4 more chains coming · 15+ by end of year"]].map(([ic,tx])=>(
              <div key={tx} style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10,fontFamily:"'Inter',-apple-system,sans-serif",fontSize:13,color:"var(--text-2)",lineHeight:1.4}}>
                <span style={{fontSize:17,flexShrink:0}}>{ic}</span>{tx}
              </div>
            ))
          }
        </div>

        <button onClick={()=>setPhase("onboarding")} style={{width:"100%",background:"var(--accent)",border:"none",borderRadius:10,padding:"16px 28px",fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:900,fontSize:15,color:"var(--accent-text)",cursor:"pointer",marginBottom:10}}>
          {lang==="BG"?"🛒 Настрой Профила Си →":"🛒 Set Up My Profile →"}
        </button>
        <button onClick={()=>setPhase("app")} style={{width:"100%",background:"none",border:"1px solid var(--border)",borderRadius:10,padding:"12px 28px",fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:600,fontSize:13,color:"var(--text-3)",cursor:"pointer"}}>
          {lang==="BG"?"Пропусни — разгледай всичко":"Skip — browse everything"}
        </button>
      </div>
    </div>
  );

  // ── ONBOARDING ─────────────────────────────────────────────────────────────
  if(phase==="onboarding"){
    const safeStep = Math.min(step, ONBOARD_CATS.length - 1);
    if(step !== safeStep) setStep(safeStep);
    const totalSteps = ONBOARD_CATS.length + 1; // +1 for location step
    const curStepNum = onboardStage==="location" ? 0 : safeStep+1;
    return (
      <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>
        <style>{CSS}</style>
        <div style={{background:"var(--bg-deep)",borderBottom:"1px solid var(--border)",padding:"12px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <div style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontWeight:900,color:"var(--accent)",fontSize:19}}>🛒 Spesti</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:10,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",letterSpacing:"1px",textTransform:"uppercase"}}>
                  {onboardStage==="location"?(lang==="BG"?"Стъпка 1 — Твоите Магазини":"Step 1 — Your Stores"):(lang==="BG"?`Стъпка ${curStepNum+1} — ${ONBOARD_CATS[safeStep]}`:`Step ${curStepNum+1} — ${ONBOARD_CATS[safeStep]}`)}
                </span>
                <span style={{fontSize:10,color:"var(--accent)",fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:700}}>{curStepNum+1} / {totalSteps}</span>
              </div>
              <div style={{background:"var(--bg-card)",borderRadius:3,height:4}}>
                <div style={{width:(((curStepNum+1)/totalSteps)*100)+"%",height:"100%",background:"var(--accent)",borderRadius:3,transition:"width 0.3s"}}/>
              </div>
            </div>
          </div>
          {/* Dark mode toggle in settings */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:10,marginTop:8}}>
            <button onClick={()=>setDark(d=>!d)} style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:12,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
              {dark?"☀️":"🌙"} {dark?(lang==="BG"?"Светъл":"Light"):(lang==="BG"?"Тъмен":"Dark")}
            </button>
            <button onClick={()=>setPhase("app")} className="ctrl-btn" style={{fontSize:10}}>{lang==="BG"?"← Назад":"← Back"}</button>
          </div>
        </div>
        <div style={{maxWidth:540,margin:"0 auto",padding:"26px 20px 60px"}} className="slidein">
          {onboardStage==="location"
            ? <NearbyStores userLoc={userLoc} activeStores={activeStores} setActiveStores={setActive}
                lang={lang} onDone={()=>setOStage("prefs")}/>
            : <OnboardStep cat={ONBOARD_CATS[safeStep]} prefs={prefs} setPrefs={setPrefs} stepNum={safeStep}
                lang={lang} isLast={safeStep===ONBOARD_CATS.length-1}
                onNext={()=>{ if(step<ONBOARD_CATS.length-1)setStep(s=>s+1); else setPhase("app"); }}
                onSkip={()=>{ if(step<ONBOARD_CATS.length-1)setStep(s=>s+1); else setPhase("app"); }}
              />
          }
        </div>
      </div>
    );
  }

  // ── STORE MANAGER MODAL ────────────────────────────────────────────────────
  if(showStoreMgr) return (
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>
      <style>{CSS}</style>
      <div style={{background:"var(--bg-deep)",borderBottom:"1px solid var(--border)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontWeight:900,color:"var(--accent)",fontSize:19}}>{lang==="BG"?"🏪 Моите Магазини":"🏪 My Stores"}</div>
        <button onClick={()=>setStoreMgr(false)} className="ctrl-btn">{lang==="BG"?"← Назад":"← Back"}</button>
      </div>
      <div style={{maxWidth:540,margin:"0 auto",padding:"24px 20px 60px"}}>
        <NearbyStores userLoc={userLoc} activeStores={activeStores} setActiveStores={setActive} lang={lang} onDone={()=>setStoreMgr(false)}/>
      </div>
    </div>
  );

  // ── APP ────────────────────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>
      <style>{CSS}</style>
      {showShare&&<SharePanel listItems={listItems} storeBreakdown={storeBreakdown} activeArr={activeArr} getQty={getQty} lang={lang} onClose={()=>setShowShare(false)}/>}
      {toast&&<div className="toast">{toast}</div>}

      {/* HEADER — Cart-centric Japandi */}
      <div style={{background:"var(--bg-nav)",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 12px rgba(0,0,0,0.05)"}}>
        <div style={{maxWidth:920,margin:"0 auto",padding:"0 20px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:60}}>
            <div style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={()=>{setView("list");setExpId(null);}}>
              <div style={{position:"relative",fontSize:32,lineHeight:1}}>
                🛒
                {listItems.length>0&&<span style={{position:"absolute",top:-5,right:-10,background:"var(--accent)",color:"var(--accent-text)",borderRadius:11,minWidth:20,height:20,fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 5px",fontFamily:"'Inter',-apple-system,sans-serif",border:"2.5px solid var(--bg-nav)",boxShadow:"0 1px 4px rgba(196,112,75,0.3)"}}>{listItems.length}</span>}
              </div>
              <span style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontSize:26,fontWeight:900,color:"var(--accent)",letterSpacing:"-0.5px",lineHeight:1}}>Spesti</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {/* My Stores button */}
              <button onClick={()=>setStoreMgr(true)} style={{display:"flex",alignItems:"center",gap:5,background:"var(--bg-deep)",border:"1.5px solid var(--border)",cursor:"pointer",borderRadius:12,padding:"6px 12px",fontFamily:"'Inter',-apple-system,sans-serif",fontSize:11,fontWeight:600,color:"var(--text-2)",transition:"all 0.18s"}}>
                <span style={{fontSize:14}}>🏪</span>
                {lang==="BG"?"Магазини":"My Stores"}
                <span style={{background:"var(--accent)",color:"var(--accent-text)",borderRadius:8,minWidth:18,height:18,fontSize:10,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{activeChains.length}</span>
              </button>
              {/* Menu button */}
              <button id="menu-btn" onClick={()=>setShowMenu(!showMenu)} style={{background:showMenu?"var(--bg-deep)":"none",border:"none",cursor:"pointer",width:40,height:40,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-2)",transition:"all 0.18s"}}>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="3.5" r="1.5" fill="currentColor"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/><circle cx="9" cy="14.5" r="1.5" fill="currentColor"/></svg>
              </button>
            </div>
          </div>
          <div style={{height:2,background:"linear-gradient(90deg,var(--accent) 0%,var(--accent) 20%,var(--border) 60%,transparent 100%)",opacity:0.4}}/>
        </div>
      </div>
      {/* Menu backdrop + dropdown — rendered outside header to avoid stacking context */}
      {showMenu&&<div onClick={()=>setShowMenu(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:200}}/>}
      {showMenu&&<div style={{position:"fixed",top:56,right:16,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:16,padding:"6px 0",minWidth:230,boxShadow:"0 8px 32px rgba(0,0,0,0.15)",zIndex:201,animation:"fadeIn 0.15s ease"}}>
        <button onClick={()=>{setStoreMgr(true);setShowMenu(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 18px",background:"none",border:"none",cursor:"pointer",fontFamily:"'Inter',-apple-system,sans-serif",fontSize:14,fontWeight:600,color:"var(--text)",textAlign:"left"}}>
          <span style={{fontSize:20,width:26,textAlign:"center"}}>🏪</span>
          {lang==="BG"?"Моите магазини":"My Stores"}
          <span style={{marginLeft:"auto",fontSize:11,color:"var(--text-4)",fontWeight:500}}>{activeChains.length}</span>
        </button>
        {listItems.length>0&&<button onClick={()=>{setShowShare(true);setShowMenu(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 18px",background:"none",border:"none",cursor:"pointer",fontFamily:"'Inter',-apple-system,sans-serif",fontSize:14,fontWeight:600,color:"var(--text)",textAlign:"left"}}>
          <span style={{fontSize:20,width:26,textAlign:"center"}}>📤</span>
          {lang==="BG"?"Сподели количката":"Share Cart"}
        </button>}
        <div style={{height:1,background:"var(--border)",margin:"4px 18px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 18px"}}>

                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:700,fontSize:12,color:"var(--text)"}}>{deal.labelBG||deal.label}</div>
                        <div style={{display:"flex",alignItems:"baseline",gap:5}}>
                          <span style={{fontFamily:"'Noto Serif JP',Georgia,serif",fontSize:16,fontWeight:900,color:"var(--green)"}}>{fmt(deal.newPrice)}</span>
                          <span style={{fontSize:10,color:"var(--text-2)",textDecoration:"line-through"}}>{fmt(deal.oldPrice)}</span>
                          <span style={{fontSize:10,color:"var(--green)",fontWeight:700}}>{lang==="BG"?"спести":"save"} {fmt(deal.oldPrice-deal.newPrice)}</span>
                        </div>
                        {hasMulti&&<span style={{fontSize:9,color:"var(--accent)",fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:700}}>{isExp?"▲":"▼"} {lang==="BG"?"сравни цени":"compare prices"}</span>}
                      </div>
                      <button onClick={(e)=>{e.stopPropagation();toggleItem(deal.prodId);}} style={{background:inList?"transparent":"var(--accent)",color:inList?"var(--green)":"var(--accent-text)",border:inList?"1px solid var(--green)":"none",borderRadius:8,padding:"6px 12px",fontWeight:800,fontSize:10,cursor:"pointer",fontFamily:"'Inter',-apple-system,sans-serif"}}>{inList?"✓":"+"}</button>
                      </div>
                      {isExp&&prod&&<div style={{borderTop:"1px solid var(--border)",background:"var(--bg-deep)",padding:"13px 12px"}}><PriceBar prod={prod} activeStores={activeStores} lang={lang}/></div>}
                    </div>;
                  })}
                </div>
              </div>}
            </div>}

            {/* Trip planner removed — lives in Магазини tab only */}

            {watchlist.size>0&&<div style={{background:"var(--bg-deep)",border:"1px solid var(--border)",borderRadius:12,padding:14}}>
              <div style={{fontSize:10,fontFamily:"'Inter',-apple-system,sans-serif",fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"var(--text-2)",marginBottom:10}}>{lang==="BG"?`🔔 ПРОСЛЕДЯВАНИ ЦЕНИ (${watchlist.size} продукта)`:`🔔 PRICE WATCHLIST (${watchlist.size} items)`}</div>
              {PRODUCTS.filter(p=>watchlist.has(p.id)).map(prod=>(
                <div key={prod.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--bg-deep)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div>
                      <div style={{fontFamily:"'Inter',-apple-system,sans-serif",fontSize:12,color:"var(--text)"}}>{pname(prod)}</div>
                      <div style={{fontSize:10,color:"var(--text-2)",fontFamily:"'Inter',-apple-system,sans-serif",marginTop:1}}>{lang==="BG"?"Най-добро":"Best"}: {fmt(getBestPrice(prod,activeArr))} {lang==="BG"?"в":"at"} {ALL_CHAINS.find(c=>c.id===getBestStore(prod,activeArr))?.name||"?"}</div>
                    </div>
                  </div>
                  <button onClick={()=>toggleWatch(prod.id)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:14}}>✕</button>
                </div>
              ))}
            </div>}
        </div>}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Spesti/>);
  </script>
  <script>
  // PWA Service Worker Registration
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('/sw.js').catch(()=>{});
    });
  }
  // PWA Install Prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt',(e)=>{
    e.preventDefault();
    deferredPrompt=e;
    // Show install button after 30 seconds of use
    setTimeout(()=>{
      const btn=document.createElement('button');
      btn.textContent='📲 Инсталирай Spesti';
      btn.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#C4704B;color:#fff;border:none;border-radius:14px;padding:12px 24px;font-family:"Inter",-apple-system,sans-serif;font-weight:800;font-size:14px;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
      btn.onclick=()=>{deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{btn.remove();deferredPrompt=null;});};
      document.body.appendChild(btn);
      setTimeout(()=>{if(btn.parentNode)btn.remove();},15000);
    },30000);
  });
  </script>
</body>
</html>
